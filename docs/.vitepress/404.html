<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        // merkt sich die eigentlich gewünschte URL (z.B. /Migration?play=1)
        var redirect = location.pathname + location.search + location.hash;

        // WICHTIG: wir laden IMMER die echte VitePress-Seite /works/
        // und reichen die Ziel-URL als redirect weiter
        location.replace('/works/?redirect=' + encodeURIComponent(redirect));
      })();
    </script>
  </head>
  <body></body>
</html>
